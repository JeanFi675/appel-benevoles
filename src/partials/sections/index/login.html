<!-- Section Authentification -->
<template x-if="!user">
  <section class="mb-12">
    <div class="max-w-md mx-auto relative">
      <!-- Main Login Card -->
      <div class="brutal-card bg-brutal-white p-8">
        <h2 class="text-3xl font-black mb-6">Connexion</h2>

        <!-- 1. Magic Link View (Default) -->
        <div x-show="loginView === 'magic'">
          <form @submit.prevent="sendMagicLink()">
            <div class="mb-4">
              <label for="email" class="block font-bold mb-2 text-lg"
                >Votre email</label
              >
              <input
                type="email"
                id="email"
                x-model="loginEmail"
                required
                placeholder="jean.dupont@example.com"
                class="brutal-input w-full px-4 py-3 text-lg"
              />
            </div>

            <button
              type="submit"
              :disabled="loading"
              class="brutal-btn bg-brutal-ice w-full py-4 text-xl shadow-brutal mb-4"
            >
              <span x-show="!loading">📧 Recevoir le lien</span>
              <span x-show="loading" x-cloak>⏳ Envoi en cours...</span>
            </button>
          </form>

          <div class="text-center mt-2 flex flex-col gap-2">
            <button
              @click="loginView = 'password'"
              type="button"
              class="text-sm border-b border-brutal-black hover:bg-brutal-yellow transition-colors cursor-pointer inline-block"
            >
              J'ai déjà un mot de passe
            </button>
            <button
              @click="requestPasswordReset()"
              type="button"
              :disabled="loading"
              class="text-sm font-bold text-gray-700 hover:text-black cursor-pointer inline-block mt-4"
            >
              Le lien du mail ne fonctionne pas ? [Créer un mot de passe de secours]
            </button>
          </div>
        </div>

        <!-- 2. Password Login View -->
        <div x-show="loginView === 'password'" x-cloak>
          <form @submit.prevent="loginWithPassword()">
            <div class="mb-4">
              <label for="email-pwd" class="block font-bold mb-2 text-lg"
                >Votre email</label
              >
              <input
                type="email"
                id="email-pwd"
                x-model="loginEmail"
                required
                placeholder="jean.dupont@example.com"
                class="brutal-input w-full px-4 py-3 text-lg"
              />
            </div>
            <div class="mb-6">
              <label for="password" class="block font-bold mb-2 text-lg"
                >Mot de passe</label
              >
              <input
                type="password"
                id="password"
                x-model="loginPassword"
                required
                placeholder="Votre mot de passe"
                class="brutal-input w-full px-4 py-3 text-lg"
              />
            </div>

            <button
              type="submit"
              :disabled="loading"
              class="brutal-btn bg-brutal-ice w-full py-4 text-xl shadow-brutal mb-4"
            >
              <span x-show="!loading">👉 Se connecter</span>
              <span x-show="loading" x-cloak>⏳ Connexion...</span>
            </button>
          </form>

          <div class="flex flex-col items-center gap-2 mt-2">
            <button
              @click="loginView = 'magic'"
              type="button"
              class="text-sm border-b border-brutal-black hover:bg-brutal-yellow transition-colors cursor-pointer inline-block"
            >
              Retour au lien magique
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>

<!-- Set Password Modal (overlaying the whole screen) -->
<div
  x-show="resetModalOpen"
  x-cloak
  class="fixed inset-0 z-50 flex items-center justify-center p-4"
  style="background-color: rgba(255, 255, 255, 0.95)"
>
  <div
    class="max-w-md mx-auto brutal-card bg-brutal-yellow p-6 w-full border-4 border-brutal-black"
  >
    <h3 class="text-2xl font-black mb-4">Créer votre mot de passe</h3>
    <p class="mb-4 text-sm">
      Définissez un mot de passe pour vous connecter plus facilement la
      prochaine fois.
    </p>

    <form @submit.prevent="updatePassword()">
      <div class="mb-6">
        <label for="new-password" class="block font-bold mb-2"
          >Nouveau mot de passe</label
        >
        <input
          type="password"
          id="new-password"
          x-model="newPassword"
          required
          minlength="6"
          placeholder="6 caractères minimum"
          class="brutal-input w-full px-4 py-2"
        />
      </div>

      <button
        type="submit"
        :disabled="loading"
        class="brutal-btn bg-brutal-black text-brutal-white w-full py-3"
      >
        <span x-show="!loading">Enregistrer</span>
        <span x-show="loading" x-cloak>⏳ Enregistrement...</span>
      </button>
    </form>
  </div>
</div>
