<!-- Section Authentification -->
<template x-if="!user">
    <section class="mb-12">
        <div class="max-w-md mx-auto">
            <div class="brutal-card bg-brutal-white p-8">
                <h2 class="text-3xl font-black mb-6" x-text="magicLinkToken ? 'Dernière étape' : 'Connexion'">Connexion</h2>

                <form @submit.prevent="sendMagicLink()" x-show="!magicLinkToken">
                    <div class="mb-4">
                        <label for="email" class="block font-bold mb-2 text-lg">Votre email</label>
                        <input type="email" id="email" x-model="loginEmail" :required="!magicLinkToken"
                            placeholder="jean.dupont@example.com" class="brutal-input w-full px-4 py-3 text-lg" />
                    </div>

                    <button type="submit" :disabled="loading"
                        class="brutal-btn bg-brutal-ice w-full py-4 text-xl shadow-brutal">
                        <span x-show="!loading">📧 Recevoir le lien de connexion</span>
                        <span x-show="loading" x-cloak>⏳ Envoi en cours...</span>
                    </button>
                </form>

                <div x-show="magicLinkToken" x-cloak class="text-center">
                    <p class="mb-6 font-bold text-lg">Pour sécuriser votre accès, veuillez confirmer votre connexion.</p>
                    
                    <button type="button" @click="verifyMagicLink()" :disabled="loading"
                        class="brutal-btn bg-brutal-ice w-full py-4 text-xl shadow-brutal">
                        <span x-show="!loading">✅ Je confirme ma connexion</span>
                        <span x-show="loading" x-cloak>⏳ Vérification...</span>
                    </button>
                    
                    <p class="mt-4 text-sm font-bold text-red-600" x-show="magicLinkError" x-text="magicLinkError"></p>
                    
                    <button type="button" @click="magicLinkToken = null; magicLinkError = ''" class="mt-4 text-sm underline cursor-pointer" x-show="magicLinkError">
                        Annuler et retourner à la connexion
                    </button>
                </div>

                <p class="mt-4 text-sm text-center" x-show="!magicLinkToken">
                    Vous recevrez un email avec un lien magique pour vous connecter sans mot de passe.
                </p>
            </div>
        </div>
    </section>
</template>
