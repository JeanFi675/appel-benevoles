<!-- Tab: Rapport IA -->
<div x-show="activeTab === 'rapport-ia'" class="brutal-card bg-brutal-white p-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
        <div>
            <h2 class="text-3xl font-black">🤖 Rapport IA — Avancement des inscriptions</h2>
            <p class="text-gray-600 font-bold mt-1">Analyse en temps réel de l'état des inscriptions par rapport aux quotas min/max.</p>
        </div>
        <button
            @click="generateRapportIA()"
            :disabled="rapportIALoading"
            class="brutal-btn bg-brutal-ice px-6 py-3 text-lg shadow-brutal whitespace-nowrap flex items-center gap-2"
            :class="rapportIALoading ? 'opacity-60 cursor-not-allowed' : ''">
            <span x-show="!rapportIALoading">✨ Générer le rapport</span>
            <span x-show="rapportIALoading" class="flex items-center gap-2">
                <svg class="animate-spin h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                Analyse en cours...
            </span>
        </button>
    </div>

    <!-- Erreur -->
    <div x-show="rapportIAError" class="mb-6 p-4 bg-red-100 border-4 border-red-500 font-bold text-red-800">
        <span x-text="rapportIAError"></span>
    </div>

    <!-- Résumé chiffré en temps réel -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
        <template x-for="periode in periodes" :key="periode.id">
            <div class="border-4 border-brutal-black p-4"
                :class="{
                    'bg-red-100':    getBenevolesInscritsForPeriode(periode.id) < getBenevolesMinForPeriode(periode.id),
                    'bg-yellow-100': getBenevolesInscritsForPeriode(periode.id) >= getBenevolesMinForPeriode(periode.id) && getBenevolesInscritsForPeriode(periode.id) < getBenevolesMaxForPeriode(periode.id),
                    'bg-green-100':  getBenevolesInscritsForPeriode(periode.id) >= getBenevolesMaxForPeriode(periode.id)
                }">
                <p class="text-xs font-black uppercase text-gray-600 mb-1" x-text="periode.nom"></p>
                <p class="text-2xl font-black" :class="getPeriodeInscritsColor(periode.id)" x-text="getBenevolesInscritsForPeriode(periode.id)"></p>
                <p class="text-sm font-bold text-gray-500">
                    min <span x-text="getBenevolesMinForPeriode(periode.id)"></span>
                    / max <span x-text="getBenevolesMaxForPeriode(periode.id)"></span>
                </p>
            </div>
        </template>
    </div>

    <!-- Rapport généré par l'IA -->
    <div x-show="rapportIA" class="border-4 border-brutal-black bg-white p-6">
        <div class="flex items-center gap-2 mb-4 pb-3 border-b-2 border-brutal-black">
            <span class="text-xl font-black">📋 Rapport généré</span>
            <span class="text-xs font-bold text-gray-500 ml-auto" x-text="rapportIADate"></span>
        </div>
        <div class="font-mono text-sm leading-relaxed whitespace-pre-wrap" x-text="rapportIA"></div>
    </div>

    <!-- Placeholder si pas encore généré -->
    <div x-show="!rapportIA && !rapportIALoading && !rapportIAError"
        class="border-4 border-dashed border-gray-300 p-12 text-center text-gray-500">
        <p class="text-4xl mb-3">🤖</p>
        <p class="font-bold text-lg">Cliquez sur "Générer le rapport" pour obtenir une analyse IA de l'avancement des inscriptions.</p>
    </div>
</div>
