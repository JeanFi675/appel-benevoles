name: CI

# Workflow de qualité pour les branches de travail et les PR.
# deploy.yml ne se déclenche que sur push vers master (build + GitHub Pages) ;
# ce workflow couvre lint + format + build sur les branches refactor/** et les PR
# afin de produire un check 'success' avant tout merge (Phase 8.0).

on:
  push:
    branches:
      - 'refactor/**'
  pull_request:
    branches:
      - master
      - 'refactor/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npx eslint src/

      - name: Format check (Prettier)
        run: npx prettier --check "src/**/*.{js,html,css,json,md}"

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_URL_PRODUCTION: ${{ secrets.VITE_APP_URL_PRODUCTION }}
        run: npm run build
