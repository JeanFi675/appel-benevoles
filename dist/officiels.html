<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bénévoles Escalade - Officiels</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"><script type="module" crossorigin src="./assets/officiels-Bq9uFP23.js"></script><link rel="modulepreload" crossorigin href="./assets/constants-CPkv6s15.js"><link rel="modulepreload" crossorigin href="./assets/api-GSACLbkQ.js"><link rel="modulepreload" crossorigin href="./assets/tshirt-B9jIGRRA.js"><link rel="stylesheet" crossorigin href="./assets/api-DhrO_xoB.css"></head><body class="bg-brutal-ice min-h-screen overflow-x-hidden" x-data="officielsApp()" x-init="init()"><div class="fixed top-4 right-4 z-50 space-y-2"><template x-for="toast in toasts" :key="toast.id"><div class="toast brutal-card px-6 py-4 max-w-md" :class="toast.type === 'error' ? 'bg-brutal-black text-brutal-ice' : 'bg-brutal-ice text-brutal-black'"><p class="font-bold" x-text="toast.message"></p></div></template></div><header class="bg-brutal-black text-brutal-white py-8 mb-8 border-b-8 border-brutal-black"><div class="container mx-auto px-4 relative"><h1 class="text-5xl font-black text-center tracking-tight">🧗 BÉNÉVOLES ESCALADE</h1><p class="text-center mt-2 text-xl font-body">Inscrivez-vous pour aider la compétition</p></div></header><main class="container mx-auto px-4 pb-24"><template x-if="!user"><section class="mb-12"><div class="max-w-md mx-auto"><div class="brutal-card bg-brutal-white p-8"><h2 class="text-3xl font-black mb-6">Connexion</h2><form @submit.prevent="requestOtp()" x-show="step === 1"><div class="mb-4"><label for="email" class="block font-bold mb-2 text-lg">Votre email</label> <input type="email" id="email" x-model="loginEmail" required placeholder="jean.dupont@example.com" class="brutal-input w-full px-4 py-3 text-lg"></div><button type="submit" :disabled="loading" class="brutal-btn bg-brutal-ice w-full py-4 text-xl shadow-brutal mt-4 font-bold"><span x-show="!loading">📧 Recevoir le code</span> <span x-show="loading" x-cloak>⏳ Envoi en cours...</span></button><p class="mt-4 text-sm text-center">Vous recevrez un email contenant un code à 6 chiffres pour vous connecter en toute sécurité.</p></form><form @submit.prevent="verifyOtp()" x-show="step === 2" x-cloak><div class="mb-4"><label for="otp" class="block font-bold mb-2 text-lg">Code à 6 chiffres</label><p class="text-sm mb-4">Envoyé à: <span class="font-bold" x-text="loginEmail"></span></p><input id="otp" x-model="otpCode" required pattern="\d{6}" maxlength="6" placeholder="123456" class="brutal-input w-full px-4 py-3 text-center tracking-[0.5em] font-mono text-2xl"></div><button type="submit" :disabled="loading" class="brutal-btn bg-yellow-400 w-full py-4 text-xl shadow-brutal mt-4 font-bold border-2 border-brutal-black"><span x-show="!loading">🔐 Se connecter</span> <span x-show="loading" x-cloak>⏳ Vérification...</span></button><div class="mt-4 flex flex-col gap-2 items-center"><button type="button" @click="step = 1; otpCode = ''" class="text-sm underline hover:font-bold">Modifier l'adresse email</button></div></form></div></div></section></template><section x-show="user" style="display:none"><div class="sticky top-0 z-40 brutal-card bg-brutal-white p-2 md:p-3 mb-4 flex flex-col gap-2 md:gap-3 shadow-brutal border-b-2 border-brutal-black"><div class="flex flex-col xl:flex-row justify-between xl:justify-start items-start xl:items-center w-full gap-2 xl:gap-4"><div class="w-full xl:w-auto shrink-0 pr-4 xl:border-r border-gray-200"><div><p class="text-[10px] md:text-xs font-bold text-gray-500 uppercase tracking-widest leading-none">Compte Officiel</p><div class="flex items-center gap-2 mt-1"><p class="text-sm md:text-base font-black break-all leading-none focus:outline-none" x-text="user?.email"></p></div></div></div><div class="w-full xl:w-auto flex-1 flex xl:flex-row gap-2"><div id="tshirt-widget-container" class="w-full xl:w-64 shrink-0" x-effect="if(user) renderTshirtWidget($el, user.id)"></div></div><div class="grid grid-cols-1 md:flex md:flex-row gap-2 w-full xl:w-auto shrink-0 justify-start xl:justify-end ml-auto"><a x-show="isAdmin" href="index.html" class="brutal-btn bg-brutal-ice text-brutal-black px-3 py-2 text-sm shadow-brutal-sm flex items-center justify-center font-bold whitespace-nowrap">🔙 Bénévoles Accueil </a><button @click="logout()" class="brutal-btn bg-brutal-black text-brutal-white px-3 py-2 text-sm shadow-brutal-sm flex items-center justify-center font-bold whitespace-nowrap">Déconnexion</button></div></div></div><div class="brutal-card bg-brutal-white p-4 md:p-8" x-show="isLoaded && showForm"><h2 class="text-2xl font-black mb-6 uppercase border-b-4 border-brutal-black inline-block pb-2">Profil Officiel</h2><form @submit.prevent="saveProfile()" class="space-y-6"><div class="grid grid-cols-1 md:grid-cols-2 gap-4"><div><label for="prenom" class="block font-bold mb-2 uppercase text-sm">Prénom *</label> <input id="prenom" x-model="profileForm.prenom" required class="brutal-input w-full px-4 py-3"></div><div><label for="nom" class="block font-bold mb-2 uppercase text-sm">Nom *</label> <input id="nom" x-model="profileForm.nom" required class="brutal-input w-full px-4 py-3"></div></div><div class="grid grid-cols-1 gap-4"><div><label for="taille_tshirt" class="block font-bold mb-2 uppercase text-sm">Taille T-Shirt *</label> <select id="taille_tshirt" x-model="profileForm.taille_tshirt" required class="brutal-select w-full px-4 py-3 bg-white"><option value="" disabled="disabled" selected="selected">Sélectionner...</option><option value="SANS">Sans T-shirt (Non merci)</option><option value="XS">XS</option><option value="S">S</option><option value="M">M</option><option value="L">L</option><option value="XL">XL</option><option value="XXL">XXL</option></select></div></div><div class="border-t-2 border-brutal-black pt-6 mt-6"><h3 class="text-xl font-bold mb-4 uppercase">Réservation Repas</h3><div class="flex flex-col gap-4 mb-4"><label class="flex items-center gap-3 brutal-checkbox-label w-fit cursor-pointer"><input type="checkbox" x-model="profileForm.repas_vendredi" class="brutal-checkbox w-6 h-6 border-brutal-black cursor-pointer"> <span class="font-bold flex-1 select-none">Repas du Vendredi soir</span></label> <label class="flex items-center gap-3 brutal-checkbox-label w-fit cursor-pointer"><input type="checkbox" x-model="profileForm.repas_samedi" class="brutal-checkbox w-6 h-6 border-brutal-black cursor-pointer"> <span class="font-bold flex-1 select-none">Repas du Samedi soir</span></label></div><div class="flex flex-col gap-4 pt-4 border-t-2 border-gray-200"><label class="flex items-center gap-3 brutal-checkbox-label w-fit cursor-pointer"><input type="checkbox" x-model="profileForm.vegetarien" class="brutal-checkbox w-6 h-6 border-green-600 accent-green-600 cursor-pointer"> <span class="font-bold flex-1 select-none text-green-800">🥬 Option Végétarien</span></label></div></div><div class="flex gap-4 pt-6 mt-6 border-t-2 border-brutal-black"><button type="submit" :disabled="loading" class="brutal-btn flex-1 bg-yellow-400 py-4 shadow-brutal border-2 border-brutal-black font-black uppercase tracking-wider hover:bg-yellow-300 transition-colors"><span x-show="!loading">💾 Enregistrer Mon Profil</span> <span x-show="loading" x-cloak>⏳ Sauvegarde...</span></button></div></form></div></section></main></body></html>
