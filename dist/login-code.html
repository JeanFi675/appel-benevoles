<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Bénévoles Escalade - Connexion par Code</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"><script type="module" crossorigin src="./assets/login-code-TQMPyoUZ.js"></script><link rel="modulepreload" crossorigin href="./assets/constants-CPkv6s15.js"><link rel="modulepreload" crossorigin href="./assets/auth-DPZA_cht.js"><link rel="stylesheet" crossorigin href="./assets/auth-DnbaelFl.css"></head><body class="bg-brutal-ice min-h-screen overflow-x-hidden" x-data="loginCodeApp()" x-init="init()"><div class="fixed top-4 right-4 z-50 space-y-2"><template x-for="toast in toasts" :key="toast.id"><div class="toast brutal-card px-6 py-4 max-w-md" :class="toast.type === 'error' ? 'bg-brutal-black text-brutal-ice' : 'bg-brutal-ice text-brutal-black'"><p class="font-bold" x-text="toast.message"></p></div></template></div><header class="bg-brutal-black text-brutal-white py-8 mb-8 border-b-8 border-brutal-black"><div class="container mx-auto px-4 relative"><h1 class="text-5xl font-black text-center tracking-tight">🧗 BÉNÉVOLES ESCALADE</h1><p class="text-center mt-2 text-xl font-body">Inscrivez-vous pour aider la compétition</p></div></header><main class="container mx-auto px-4 pb-24 pt-12"><section class="mb-12"><div class="max-w-md mx-auto"><div class="brutal-card bg-brutal-white p-8"><h2 class="text-3xl font-black mb-6 text-center">Connexion Cachée</h2><form @submit.prevent="requestOtp()" x-show="step === 1"><div class="mb-4"><label for="email" class="block font-bold mb-2 text-lg">Votre email</label> <input type="email" id="email" x-model="email" required placeholder="jean.dupont@example.com" class="brutal-input w-full px-4 py-3 text-lg"></div><button type="submit" :disabled="loading" class="brutal-btn bg-brutal-ice w-full py-4 text-xl shadow-brutal mt-4 font-bold"><span x-show="!loading">📧 Recevoir le code</span> <span x-show="loading" x-cloak>⏳ Envoi en cours...</span></button><p class="mt-4 text-sm text-center">Vous recevrez un email contenant un code à 6 chiffres pour vous connecter en toute sécurité.</p></form><form @submit.prevent="verifyOtp()" x-show="step === 2" x-cloak><div class="mb-4"><label for="otp" class="block font-bold mb-2 text-lg">Code à 6 chiffres</label><p class="text-sm mb-4">Envoyé à: <span class="font-bold" x-text="email"></span></p><input id="otp" x-model="otpCode" required pattern="\d{6}" maxlength="6" placeholder="123456" class="brutal-input w-full px-4 py-3 text-center tracking-[0.5em] font-mono text-2xl"></div><button type="submit" :disabled="loading" class="brutal-btn bg-yellow-400 w-full py-4 text-xl shadow-brutal mt-4 font-bold border-2 border-brutal-black"><span x-show="!loading">🔐 Se connecter</span> <span x-show="loading" x-cloak>⏳ Vérification...</span></button><div class="mt-4 flex flex-col gap-2 items-center"><button type="button" @click="step = 1; otpCode = ''" class="text-sm underline hover:font-bold">Modifier l'adresse email</button></div></form></div></div></section></main></body></html>
